worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream django_app {
        server 127.0.0.1:8000;
    }

    # 1. HTTP(80) 요청을 HTTPS(443)로 강제 전환
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # 2. HTTPS(443) 보안 서버 (Windows 경로 구성)
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL 인증서 매핑 (Windows 경로 형식 적용)
        ssl_certificate C:/skn29_자연어/AI_APPLICATION_DJANGO_V3/nginx/certs/django.crt;
        ssl_certificate_key C:/skn29_자연어/AI_APPLICATION_DJANGO_V3/nginx/certs/django.key;

        # SSL 암호화 사양 최적화
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 50M;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # 보안 헤더 추가
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # 정적 리소스 직접 서빙 (Windows 경로 예시)
        location /static/ {
            alias C:/skn29_자연어/AI_APPLICATION_DJANGO_V3/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # 미디어 리소스 직접 서빙 (Windows 경로 예시)
        location /media/ {
            alias C:/skn29_자연어/AI_APPLICATION_DJANGO_V3/media/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # WAS Waitress 중계 연동
        location / {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 중요: Django 측에 HTTPS 연결 상태를 알리기 위해 포워딩 헤더 설정
            proxy_set_header X-Forwarded-Proto https;
            
            proxy_set_header Host $http_host;
            proxy_redirect off;
            proxy_pass http://django_app;
        }
    }
}