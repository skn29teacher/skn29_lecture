<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>동기 vs 비동기 및 AJAX 기초</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-color: #f8fafc;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent: #10b981;
      --danger: #ef4444;
      --border: #334155;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 800px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      text-align: center;
      background: linear-gradient(to right, #3b82f6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .section-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 1rem;
      color: var(--primary);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    .btn-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    button:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }
    button.accent {
      background-color: var(--accent);
    }
    button.accent:hover {
      filter: brightness(0.9);
    }
    .test-area {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px dashed var(--border);
      padding: 1rem;
      border-radius: 8px;
      margin-top: 0.5rem;
    }
    .log-panel {
      background-color: #020617;
      color: #38bdf8;
      font-family: monospace;
      padding: 1rem;
      border-radius: 8px;
      height: 150px;
      overflow-y: auto;
      border: 1px solid var(--border);
      margin-top: 0.5rem;
      white-space: pre-wrap;
    }
    input[type="text"] {
      background-color: #0f172a;
      border: 1px solid var(--border);
      color: white;
      padding: 0.5rem;
      border-radius: 6px;
      width: 200px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>동기 vs 비동기 및 AJAX 기초</h1>

    <!-- 1단계: 동기식 블로킹 vs 비동기식 넌블로킹 -->
    <div class="section-card">
      <div class="section-title">1단계: 동기 블로킹 vs 비동기 넌블로킹 & 이벤트 버블링</div>
      <div class="btn-group">
        <button id="btn-sync">동기식 블로킹 연산 (3초)</button>
        <button id="btn-async" class="accent">비동기식 넌블로킹 타이머 (3초)</button>
      </div>
      <div class="test-area">
        <strong>반응성 테스트 영역:</strong>
        <input type="text" placeholder="여기에 타이핑해 보세요...">
        <button id="btn-click-count">클릭 횟수: 0</button>
        <label style="margin-left: 10px;">
          <input type="checkbox" id="chk-bubble"> 버블링 방지(stopPropagation)
        </label>
      </div>
    </div>

    <!-- 2단계: XHR을 이용한 AJAX 통신 (readyState 추적) -->
    <div class="section-card">
      <div class="section-title">2단계: XMLHttpRequest (XHR) & readyState 라이프사이클</div>
      <div class="btn-group">
        <button id="btn-xhr">XHR로 사용자 데이터 요청</button>
      </div>
      <div id="xhr-result" class="test-area">결과가 여기에 표시됩니다.</div>
    </div>

    <!-- 3단계: 콜백 지옥 맛보기 -->
    <div class="section-card">
      <div class="section-title">3단계: 비동기 콜백 중첩 (콜백 지옥)</div>
      <div class="btn-group">
        <button id="btn-callback-hell">콜백 지옥 실행</button>
      </div>
    </div>

    <!-- 공통 로그 패널 -->
    <div class="section-card">
      <div class="section-title" style="color: #38bdf8;">콘솔 로그 모니터</div>
      <div id="log-panel" class="log-panel"></div>
      <button onclick="clearLog()" style="margin-top: 0.5rem; background-color: var(--danger);">로그 지우기</button>
    </div>
  </div>

  <script>
    // 로그 출력용 유틸리티 함수
    const logPanel = document.getElementById('log-panel');
    function log(message) {
      const time = new Date().toLocaleTimeString();
      logPanel.innerText += `[${time}] ${message}\n`;
      logPanel.scrollTop = logPanel.scrollHeight;
    }
    function clearLog() {
      logPanel.innerText = '';
    }

    // ==========================================
    // 1단계: 동기 블로킹 vs 비동기 넌블로킹 & 버블링
    // ==========================================
    
    // 클릭 횟수 증가 및 버블링 실습
    let count = 0;
    const btnClickCount = document.querySelector('#btn-click-count');
    const chkBubble = document.querySelector('#chk-bubble');
        
    btnClickCount.addEventListener('click', (e)=>{
        count++;
        btnClickCount.textContent = `클릭 횟수: ${count}`;
        log(`[클릭] 카운터 버튼 클릭됨 (${count})`);

        if(chkBubble.checked){
            e.stopPropagation();
            log('--> 버블링 전파가 차단되었습니다. (e.stopPropagation())');
        }
    });

    const btnSync = document.querySelector('.section-card');
    btnSync.addEventListener('click', ()=>{
        log('버블링 감지');
    });

    // 동기식 블로킹 연산
    document.querySelector('#btn-sync').addEventListener('click', ()=>{
        log('동기식 연산 (3초간 브라우저 락...)');
        const start = Date.now();
        while(Date.now() - start < 3000){
            // 아무것도 안하고 대기(cpu 점유)
        }
        log('동기식 연산 종료... (이제 인터렉션이 다시 동작함)');
    });

    // 비동기식 settimer호출
    document.querySelector('#btn-async').addEventListener('click',()=>{
        setTimeout(() => {
            log('비동기 타이머 완료(3초대기)');
        }, 3000);
        log('비동기식 타이머 등록완료');
    });

    // ==========================================
    // 2단계: XMLHttpRequest (XHR) & readytState
    // ==========================================
    document.querySelector('#btn-xhr').addEventListener('click', ()=>{
        const xhrResult = document.querySelector('#xhr-result');
        // 1 객체생성 및 통신 구현
        const xhr =  new XMLHttpRequest();
        // 2 readyState 라이프싸이클을 위한 리스너 등록
        xhr.onreadystatechange = ()=>{
            log(`XHR readyState : ${xhr.readyState}  (${getReadyStateName(xhr.readyState)}) `);
            // 통신완료 및 http 상태 코드 ok(200) 검증
            if(xhr.readyState === 4){
                if (xhr.status === 200){
                    const users = JSON.parse(xhr.responseText)
                    xhrResult.textContent = `조회 완료 첫 번째 사용자 : ${users[0].name} (${users[0].email})`;
                    log(xhr.responseText);
                    log('xhr 통신 성공 및 데이터 렌더링 완료');
                }else{
                    xhrResult.textContent = '데이터 요청 실패';
                    log(`xhr 통신 에러 발생 상태코드 : ${xhr.status}`);
                }
            }
        };
        // 연결설정 및 전송
        xhr.open('GET', 'https://jsonplaceholder.typicode.com/users', true);
        xhr.send();
        
        function getReadyStateName(state){
            const names = {
                0:'UNSENT - 객체 생성',
                1:'OPENED - 연결 설정 완료',
                2:'HEADERS_RECEIVED - 응답 헤더 수신',
                3:'LOADING - 데이터 다운로드중',
                4:'DONE - 작업완료',
            };
            return names[state] || 'UNKNOWN';
        }
    });

    // ==========================================
    // 3단계: 비동기 콜백 중첩(콜백 지옥)
    // ==========================================
    // 가상의 비동기 함수
    function fackeLogin(email, callback){
        setTimeout(() => {
            log(`[1] 로그인 성공: ${email}`);
            callback(email);
        }, 1000);
    }
    function fakeGetProfile(email, callback){
        setTimeout(() => {
            log(`[2] 포르필 로드 완료:${email}의 프로필`);
            callback({name:'홍길동', role:'admin'});
        }, 1000);
    }
    function fakeNotifications(profile, callback){
        setTimeout(() => {
            log(`[3] 알림메시지 로드완료 :${profile.name}님의 알림 5건`);
            callback(['알림1','알림2']);
        }, 1000);
    }

    document.querySelector('#btn-callback-hell').addEventListener('click',(email)=>{
        log('콜백지옥 시작');
        // 3개의 비동기 함수를 순차적으로 호출(로그인->프로필->알림)
        fackeLogin('user@test.com',(email)=>{
            fakeGetProfile(email, (profile)=>{
                fakeNotifications(profile, (notification)=>{
                    log(`최종 알림 처리 완료: [${notification.join(', ')}]`)
                });
            });
        });
    });



  </script>
</body>
</html>
