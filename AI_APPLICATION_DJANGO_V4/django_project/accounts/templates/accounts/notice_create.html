<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>공지사항 등록</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            margin-bottom: 24px;
            color: #1a1a1a;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4b5563;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .form-group textarea {
            height: 150px;
            resize: none;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #2563eb;
        }
        .btn-box {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }
        .btn-submit {
            padding: 10px 20px;
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #1d4ed8;
        }
        .btn-cancel {
            padding: 10px 20px;
            background-color: #e5e7eb;
            color: #4b5563;
            text-decoration: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            transition: background-color 0.2s;
        }
        .btn-cancel:hover {
            background-color: #d1d5db;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>공지사항 작성</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">공지 제목</label>
                <input type="text" id="title" name="title" required placeholder="공지사항의 제목을 입력해 주세요.">
            </div>
            <div class="form-group">
                <label for="content">공지 내용</label>
                <textarea id="content" name="content" required placeholder="공지사항의 본문 내용을 입력해 주세요."></textarea>
            </div>
            <div class="btn-box">
                <a href="{% url 'notice_list' %}" class="btn-cancel">취소</a>
                <button type="submit" class="btn-submit">등록하기</button>
            </div>
        </form>
    </div>
</body>
</html>
