<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 리스트</title>
</head>
<body>
    <h2>공지사항</h2>    
    {% for notice in notices %}
        {{ notice.title }}<br>
        {{ notice.content }}<br>
        {{ notice.created_at }}
    {% endfor %}
    <!-- can_publish_notice 권한을 가진 사용자에게만 작성 버튼 노출 -->     
    {% if perms.accounts.can_publish_notice %}
        <a href="{% url 'notice_create' %}">공지사항 등록</a>
    {% endif %}

</body>
</html>
