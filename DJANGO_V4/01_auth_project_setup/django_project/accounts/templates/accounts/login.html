<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
</head>
<body>
    <h2>로그인</h2>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <label>{{field.label}}</label>
            {{field}}
            <br>
            {% if field.errors %}
                {% for error in field.errors %}
                    {{error}}
                {% endfor %}
            {% endif %}
        {% endfor %}
        <button type="submit">로그인</button>
    </form>
    <a href="{% url 'signup' %}">회원가입</a>
</body>
</html>
