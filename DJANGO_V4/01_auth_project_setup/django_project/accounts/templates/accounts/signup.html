<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .signup-card{
            max-width:500px;
            margin:auto;
            margin-top:60px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        .card-header{
            background:linear-gradient(135deg,#0d6efd,#4f8cff);
            color:white;
            border-radius:20px 20px 0 0 !important;
            padding:25px;
            text-align:center;
        }

        .card-body{
            padding:35px;
        }

        label{
            font-weight:600;
            margin-bottom:6px;
        }

        .form-control,
        .form-select{
            border-radius:10px;
            padding:10px 14px;
        }

        .btn-primary{
            border-radius:10px;
            padding:12px;
            font-weight:600;
        }

        .errorlist,
        .text-danger{
            list-style:none;
            padding-left:0;
            margin-top:5px;
            margin-bottom:0;
            font-size:.9rem;
        }

        @media (max-width:576px){
            .signup-card{
                margin:20px;
            }

            .card-body{
                padding:25px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card signup-card">

        <div class="card-header">
            <h3 class="mb-1">회원가입</h3>
            <small>회원 정보를 입력해주세요.</small>
        </div>

        <div class="card-body">

            <form method="POST" novalidate>
                {% csrf_token %}

                {% for field in form %}

                <div class="mb-3">

                    <label class="form-label" for="{{ field.id_for_label }}">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.help_text %}
                        <div class="form-text">
                            {{ field.help_text }}
                        </div>
                    {% endif %}

                    {% for error in field.errors %}
                        <div class="text-danger">
                            {{ error }}
                        </div>
                    {% endfor %}

                </div>

                {% endfor %}

                <button class="btn btn-primary w-100" type="submit">
                    가입하기
                </button>

            </form>

        </div>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    // Django Form 입력창에 Bootstrap 클래스 적용
    document.querySelectorAll("input, select, textarea").forEach(function(el){

        if(el.type === "checkbox"){
            el.classList.add("form-check-input");
        }else{
            el.classList.add("form-control");
        }

    });

});
</script>

</body>
</html>
