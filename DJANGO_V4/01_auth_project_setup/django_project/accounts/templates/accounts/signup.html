<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <h2>회원 정보 등록</h2>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <label>{{field.label}}</label>
            {{field}}
            <br>
            {% for error in field.errors %}
                {{error}}
            {% endfor %}

        {% endfor %}
        <button type="submit">가입하기</button>
    </form>
</body>
</html>
