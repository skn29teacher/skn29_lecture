<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 완료</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .success-card{
            max-width:500px;
            margin:80px auto;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
            animation:fadeIn .6s ease;
        }

        .card-header{
            background:linear-gradient(135deg,#198754,#45c97c);
            color:white;
            border-radius:20px 20px 0 0 !important;
            padding:30px;
            text-align:center;
        }

        .card-body{
            padding:40px 35px;
            text-align:center;
        }

        .success-icon{
            font-size:70px;
            color:#198754;
            margin-bottom:20px;
        }

        .btn{
            border-radius:10px;
            padding:12px;
            font-weight:600;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media (max-width:576px){
            .success-card{
                margin:20px;
            }

            .card-body{
                padding:30px 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card success-card">

        <div class="card-header">
            <h3 class="mb-0">
                회원가입 완료
            </h3>
        </div>

        <div class="card-body">

            <i class="bi bi-check-circle-fill success-icon"></i>

            <h4 class="fw-bold mb-3">
                회원가입이 완료되었습니다.
            </h4>

            <p class="text-muted mb-4">
                서비스를 이용해 주셔서 감사합니다.<br>
                로그인 후 다양한 기능을 이용하실 수 있습니다.
            </p>

            <div class="d-grid gap-2">
                <a href="{% url 'login' %}" class="btn btn-success">
                    <i class="bi bi-box-arrow-in-right"></i>
                    로그인하기
                </a>

                <a href="{% url 'main' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-house"></i>
                    메인으로 이동
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
