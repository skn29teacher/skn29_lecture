worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream django_app {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # 파일 업로드 크기 제한 해제 (50MB)
        client_max_body_size 50M;

        # Gzip 압축 전송 설정
        gzip on;
        gzip_comp_level 5;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # 로깅 파일 설정
        access_log logs/django_access.log;
        error_log logs/django_error.log;

        # 1. 정적 파일 직접 서빙 (Windows 경로 예시)
        # Windows Nginx에서는 파일 경로 구분자로 슬래시(/)를 사용하는 것이 오류를 막는 가장 안전한 방법입니다.
        location /static/ {                      
            alias C:/skn29_자연어/AI_APPLICATION_DJANGO_V3/staticfiles;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # 2. 미디어 파일 직접 서빙 (Windows 경로 예시)
        location /media/ {
            alias C:/skn29_자연어/AI_APPLICATION_DJANGO_V3/media;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # 3. Waitress WAS로 동적 요청 전달
        location / {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_redirect off;
            proxy_pass http://django_app;
        }
    }
}