worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # upstream 정의: Windows 환경에서 기동 중인 Waitress TCP 주소(127.0.0.1:8000)를 연결합니다.
    upstream django_app {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # 파일 업로드 크기 제한 해제 (50MB)
        client_max_body_size 50M;

        # 로깅 파일 설정 (Windows Nginx의 기본 logs 폴더 내에 저장)
        access_log logs/django_access.log;
        error_log logs/django_error.log;

        # 모든 일반 동적 요청을 Waitress WAS로 프록싱
        location / {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            
            # 리다이렉트 충돌 방지
            proxy_redirect off;
            
            # 정의된 TCP upstream으로 패스
            proxy_pass http://django_app;
        }
    }
}2